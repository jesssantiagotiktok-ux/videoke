<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
    padding:15px;
    min-height:100vh;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#00ffff;
    font-size:26px;
    text-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff;
}

.search-box{
    position:sticky;
    top:0;
    background:#000;
    padding-bottom:15px;
    z-index:100;
}

#search{
    width:100%;
    padding:16px 20px;
    font-size:18px;
    border-radius:40px;
    border:2px solid #00ffff;
    background:#111;
    color:white;
    outline:none;

    box-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff;

    transition:.3s;
}

#totalSongs{
    text-align:center;
    color:gold;
    font-size:18px;
    margin-bottom:15px;
    font-weight:bold;
    text-shadow:
        0 0 5px gold,
        0 0 10px gold;
}

#search:focus{
    box-shadow:
        0 0 15px #00ffff,
        0 0 30px #00ffff,
        0 0 60px #00ffff;
}

#count{
    text-align:center;
    color:#00ffff;
    margin:20px 0;
    font-size:16px;
}

/* Desktop */

.header{
    display:grid;
    grid-template-columns:90px 1fr 2fr;
    gap:10px;
    padding:12px;
    background:#00ffff;
    color:black;
    font-weight:bold;
    border-radius:10px;
    margin-bottom:10px;
}

.row{
    display:grid;
    grid-template-columns:90px 1fr 2fr;
    gap:10px;
    padding:12px;
    border-bottom:1px solid #222;
}

.row:nth-child(even){
    background:#111;
}

/* Mobile */

@media(max-width:600px){

    .header{
        display:none;
    }

    .row{
        display:block;
        background:#111;
        margin-bottom:10px;
        border-radius:12px;
        border:1px solid #222;
        box-shadow:0 0 10px rgba(0,255,255,.25);
    }

    .code{
        color:gold;
        font-weight:bold;
        margin-bottom:6px;
        font-size:15px;
    }

    .singer{
        color:#00ff88;
        margin-bottom:6px;
    }

    .title{
        font-size:18px;
        font-weight:bold;
    }
}
.row{
    display:flex;
    align-items:center;
    gap:10px;
}

.code{
    width:90px;
}

.singer{
    width:220px;
}

.title{
    flex:1;
}

.play{
    width:60px;
    text-align:center;
}
.play-btn{
    width:36px;
    height:36px;
    border:none;
    border-radius:50%;
    cursor:pointer;
    font-size:18px;
}
.header,
.row{
    display:grid;
    grid-template-columns:90px 220px 1fr 70px;
    align-items:center;
}
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow-x:hidden; /* tanggal horizontal scrollbar */
    overflow-y:auto;
    box-sizing:border-box;
}

*{
    box-sizing:border-box;
}
.container{
    width:100%;
    max-width:100%;
}
</style>

    const search = document.getElementById("search");
    search.focus();
};

function renderSongs(list){

    songList.innerHTML = "";

    if(list.length === 0){
        count.innerHTML = "❌ No songs found";
        return;
    }

    count.innerHTML = `🎵 ${list.length} song(s) found`;

    list.forEach(song => {

        songList.innerHTML += `
            <div class="row">
                <div class="code">${song.code}</div>
                <div class="singer">${song.title}</div>
                <div class="title">${song.singer}</div>

                <div class="play">
                    <button class="play-btn" onclick="playSong('${song.code}')">
                        ▶
                    </button>
                </div>
            </div>
        `;

    });

}

    const value = search.value.trim().toLowerCase();

    if(value === ""){
        songList.innerHTML = "";
        count.innerHTML = "🔍 Search a song title, singer, or code";
        return;
    }

    const filtered = songs.filter(song =>
        song.code.toLowerCase().includes(value) ||
        song.singer.toLowerCase().includes(value) ||
        song.title.toLowerCase().includes(value)
    );

    renderSongs(filtered);

});
