<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Echo Mix Activation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:#101010;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#fff;
}

.box{
    width:420px;
    background:#1d1d1d;
    padding:35px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,255,100,.2);
}

h2{
    color:#00ff99;
    margin-bottom:10px;
}

p{
    color:#ccc;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#333;
    color:#fff;
    font-size:17px;
    text-align:center;
}

input:focus{
    outline:none;
    box-shadow:0 0 12px #00ff99;
}

button{
    width:100%;
    margin-top:18px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00b85c;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#00d66d;
}

#msg{
    margin-top:18px;
    color:#ffcc66;
    white-space:pre-line;
}
</style>

</head>
<body>

<div class="box">

<h2>🎤 Echo Mix Videoke</h2>

<p>Enter Pass Key</p>

<input
id="key"
type="password"
placeholder="Enter Pass Key"
autocomplete="off">

<button onclick="activate()">
CONTINUE
</button>

<div id="msg"></div>

</div>

<script>

const KEYS={

"TRIAL":{hours:1},

"TRIAL1":{dayS:1},

"PROPjAwmRl":{days:30},

"PROkJAHIbH":{days:60},

"PROdBMnZHi":{days:180},

"PROLkQpZMv":{days:365},

"PROLIFEtimeUser673":{life:true}

};

//=========================
// CHECK LICENSE
//=========================

checkLicense();

function checkLicense(){

    const license=JSON.parse(localStorage.getItem("license"));

    if(!license) return;

    if(license.life){

        window.location.href="menu.html";
        return;

    }

    if(Date.now()<license.expire){

        window.location.href="menu.html";

    }else{

        localStorage.removeItem("license");

        document.getElementById("msg").innerHTML=
        "Trial Expired<br><br>"+
        "Please purchase a Pro Pass Key. <br> Available validity <br> 1 Month <br> 2 Months <br> 6 Months <br> 1 Year <br> Lifetime";

    }

}

function activate(){

    const key = document.getElementById("key").value.trim();
    if(key === "TRIAL"){

        const lastTrial = localStorage.getItem("lastTrial");

        if(lastTrial){

            const nextTrial = Number(lastTrial) + (7 * 24 * 60 * 60 * 1000);

            if(Date.now() < nextTrial){

                const remaining = nextTrial - Date.now();

                const days = Math.ceil(remaining / (24 * 60 * 60 * 1000));

                document.getElementById("msg").innerHTML =
                    "<span style='color:red'>Trial already used.<br>Please try again after "
                    + days + " day(s).</span>";

                return;
            }
        }

        localStorage.setItem("lastTrial", Date.now());
    }
    if(key === "TRIAL1"){

    const lastTrial1 = localStorage.getItem("lastTrial1");

    if(lastTrial1){

        const nextTrial = Number(lastTrial1) + (30 * 24 * 60 * 60 * 1000);

        if(Date.now() < nextTrial){

            const days = Math.ceil((nextTrial - Date.now())/(24*60*60*1000));

            document.getElementById("msg").innerHTML =
            "<span style='color:red'>TRIAL1 can be used again after "
            + days + " day(s).</span>";

            return;
        }
    }

    localStorage.setItem("lastTrial1", Date.now());
}

    // =========================
    // CHECK PASS KEY
    // =========================

    const info = KEYS[key];

if(
    key === "PROPjAwmRQ" ||
    key === "PROkJAHIbH" ||
    key === "PROdBMnZHi" ||
    key === "PROLkQpZMv" ||
    key === "PROLIFEtimeUser673"
){

    if(localStorage.getItem("USED_" + key)){

        document.getElementById("msg").innerHTML =
        "<span style='color:red'>This Pass Key has already been used.</span>";

        return;
    }

}

    if(!info){

        document.getElementById("msg").innerHTML =
            "<span style='color:red'>Invalid Pass Key</span>";

        return;
    }

    let license = {};

    if(info.life){

        license = {
            life: true
        };

    }else if(info.hours){

        license = {
            expire: Date.now() + info.hours * 60 * 60 * 1000
        };

    }else{

        license = {
            expire: Date.now() + info.days * 24 * 60 * 60 * 1000
        };
    }

    localStorage.setItem("license", JSON.stringify(license));

    window.location.href = "menu.html";
}

//=========================
// ENTER KEY
//=========================

document.getElementById("key").addEventListener("keydown", function(e){

    if(e.key === "Enter"){
        activate();
    }

});

</script>

</body>
</html>
